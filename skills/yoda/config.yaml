# yoda — the knobs that change.
# The METHOD lives in SKILL.md; your PREFERENCES live here. Same split that keeps a
# model's assumptions out of its formulas. Read at the start of every session;
# any missing key falls back to the default noted below.

# Where per-topic folders (state.json + map.html + map.md) are written, relative
# to the working directory. Point this at a fixed vault if you want all learning
# in one place across projects (e.g. "~/notes/yoda").
topics_dir: yoda

analogies:
  # Pull analogies from these first, in order. Keep them concrete and easy to SEE.
  prefer:
    - airlines and airports          # your professional home turf — use it heavily
    - everyday physical life          # luggage, queues, kitchens, traffic, the post — things anyone can picture
  # Steer away from these unless explicitly asked.
  avoid:
    - niche software/framework internals (Svelte, Drizzle, Inngest, etc.)
    - abstract math or finance metaphors for non-math/finance topics
  rule: >
    One analogy per hard idea. It must be concrete and visualizable — if you
    can't picture it as a physical scene, it's the wrong analogy. Reach for an
    airport/airline picture first, then everyday physical life.

recall:
  # active = teach-back gate after every chunk (the Feynman default).
  # passive = explain with light, optional checks (lower friction, weaker retention).
  mode: active

# The roadmap groups regions into tiers, foundations first. Rename the labels freely.
roadmap:
  tiers: [Foundations, Core, Advanced, Frontier]

# Your grip on each chunk, rated 0–4 after every answer. Rename the labels freely.
mastery:
  levels: [Unseen, Fragile, Working, Solid, Expert]
  # How blunt to be when rating: name the specific gap and the move to the next
  # level, with no flattery.  (brutal | gentle)
  honesty: brutal

# Open a returning session by running the due reviews before any new material.
review_on_resume: true

# Hand a deep single-chunk drill to the `tutor` skill when it's installed.
tutor_handoff: true

visuals:
  # The map is a clickable roadmap (region + chunk nodes, progress checkmarks).
  # Clicking a node opens a right-side drawer with the details. For structural
  # chunks, yoda draws a simple schema (boxes + arrows) in that drawer — from a
  # small structured spec, no image model needed.
  #   none | key_chunks_and_grammars | every_chunk
  diagrams: key_chunks_and_grammars
