<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Yoda — roadmap</title>
    <style>
      :root {
        --bg: #fafaf5;
        --panel: #fdfcf9;
        --ink: #1a1814;
        --muted: #78716c;
        --line: #e8e5df;
        --line-strong: #d4d0c8;
        --accent: #d97706;
        --accent-soft: #fff7ed;
        --good: #4a7c59;
        --warn: #b45309;
        --due: #c2410c;
        --due-soft: #fff3ee;
        --node: #fef3c7;
        --node-primary: #fde68a;
        --node-border: #d97706;
        --node-ink: #451a03;
        --t-foundation: #4a7c59;
        --t-core: #d97706;
        --t-advanced: #c2410c;
        --t-frontier: #9b3d6b;
        --m0: #a8a29e;
        --m1: #e8651a;
        --m2: #d97706;
        --m3: #4a7c59;
        --m4: #1e6b4a;
        --radius: 12px;
        --shadow:
          0 1px 2px rgba(26, 18, 10, 0.05), 0 6px 18px rgba(26, 18, 10, 0.06);
        --maxw: 1080px;
        --font:
          "Söhne", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter,
          system-ui, sans-serif;
        --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
      }
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
          --bg: #0f0e0c;
          --panel: #1a1814;
          --ink: #f5f0e8;
          --muted: #a8a29e;
          --line: #2c2820;
          --line-strong: #3d3830;
          --accent: #fb923c;
          --accent-soft: #1c1410;
          --good: #6ee7a0;
          --warn: #f59e0b;
          --due: #dc6b2f;
          --due-soft: #1c1008;
          --node: #2a1f0a;
          --node-primary: #3d2e0a;
          --node-border: #a16207;
          --node-ink: #fde68a;
          --t-foundation: #6ee7a0;
          --t-core: #fb923c;
          --t-advanced: #f87171;
          --t-frontier: #f472b6;
          --m0: #57534e;
          --m1: #fb923c;
          --m2: #f59e0b;
          --m3: #6ee7a0;
          --m4: #34d399;
          --shadow: 0 1px 2px rgba(0, 0, 0, 0.4), 0 8px 24px rgba(0, 0, 0, 0.5);
        }
      }
      [data-theme="dark"] {
        --bg: #0f0e0c;
        --panel: #1a1814;
        --ink: #f5f0e8;
        --muted: #a8a29e;
        --line: #2c2820;
        --line-strong: #3d3830;
        --accent: #fb923c;
        --accent-soft: #1c1410;
        --good: #6ee7a0;
        --warn: #f59e0b;
        --due: #dc6b2f;
        --due-soft: #1c1008;
        --node: #2a1f0a;
        --node-primary: #3d2e0a;
        --node-border: #a16207;
        --node-ink: #fde68a;
        --t-foundation: #6ee7a0;
        --t-core: #fb923c;
        --t-advanced: #f87171;
        --t-frontier: #f472b6;
        --m0: #57534e;
        --m1: #fb923c;
        --m2: #f59e0b;
        --m3: #6ee7a0;
        --m4: #34d399;
        --shadow: 0 1px 2px rgba(0, 0, 0, 0.4), 0 8px 24px rgba(0, 0, 0, 0.5);
      }
      * {
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: var(--font);
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
      }
      .wrap {
        max-width: var(--maxw);
        margin: 0 auto;
        padding: 0 1.25rem;
      }

      header.top {
        padding: 2.2rem 0 1rem;
      }
      .eyebrow {
        font-size: 0.72rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        font-weight: 500;
      }
      h1 {
        font-size: clamp(1.5rem, 3.2vw, 2.15rem);
        margin: 0.35rem 0 0.5rem;
        line-height: 1.15;
        letter-spacing: -0.02em;
      }
      .one-sentence {
        font-size: clamp(1rem, 1.7vw, 1.14rem);
        max-width: 64ch;
        border-left: 3px solid var(--accent);
        padding-left: 0.9rem;
        margin: 0.5rem 0 1rem;
      }
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin: 0.5rem 0;
      }
      .chip {
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--muted);
        background: var(--panel);
        border: 1px solid var(--line);
        padding: 0.26rem 0.6rem;
        border-radius: 999px;
      }
      .chip b {
        color: var(--ink);
        font-weight: 600;
      }
      .chip.level {
        border-color: var(--accent);
        color: var(--accent);
      }
      .progress-wrap {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        margin-top: 0.9rem;
      }
      .bar {
        flex: 1;
        height: 9px;
        background: var(--line);
        border-radius: 999px;
        overflow: hidden;
      }
      .bar > i {
        display: block;
        height: 100%;
        background: linear-gradient(90deg, var(--accent), var(--good));
        border-radius: 999px;
        transition: width 0.4s;
      }
      .bar-label {
        font-size: 0.82rem;
        color: var(--muted);
        white-space: nowrap;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
        align-items: center;
        margin-top: 1rem;
      }
      .search {
        flex: 1;
        min-width: 170px;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 0.5rem 0.7rem;
      }
      .search input {
        border: 0;
        background: transparent;
        color: var(--ink);
        font: inherit;
        width: 100%;
        outline: none;
      }
      .btn {
        font: inherit;
        font-size: 0.85rem;
        cursor: pointer;
        background: var(--panel);
        color: var(--ink);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 0.5rem 0.8rem;
        display: inline-flex;
        gap: 0.45rem;
        align-items: center;
      }
      .btn:hover {
        border-color: var(--line-strong);
      }
      .btn .pill {
        font-size: 0.72rem;
        font-weight: 700;
        background: var(--due);
        color: #fff;
        border-radius: 999px;
        padding: 0 0.4rem;
      }
      .btn .pill.zero {
        background: var(--good);
      }

      /* legend */
      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 1.4rem;
        margin: 1.1rem 0 0.4rem;
        padding: 0.7rem 0.9rem;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 10px;
        font-size: 0.76rem;
        color: var(--muted);
      }
      .leg-group {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex-wrap: wrap;
      }
      .leg-h {
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 0.68rem;
        color: var(--ink);
      }
      .leg-item {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
      }
      .leg-sw {
        width: 11px;
        height: 11px;
        border-radius: 3px;
        display: inline-block;
      }
      .leg-dot {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        display: inline-grid;
        place-items: center;
        font-size: 10px;
        font-weight: 800;
        color: #fff;
      }

      /* tier bands */
      .tierband {
        border-left: 4px solid var(--tier-color);
        background: var(--tier-tint);
        border-radius: 12px;
        padding: 0.85rem 1rem 1rem;
        margin-bottom: 1.3rem;
      }
      .tierband.foundation {
        --tier-color: var(--t-foundation);
      }
      .tierband.core {
        --tier-color: var(--t-core);
      }
      .tierband.advanced {
        --tier-color: var(--t-advanced);
      }
      .tierband.frontier {
        --tier-color: var(--t-frontier);
      }
      .tierband {
        --tier-tint: color-mix(in srgb, var(--tier-color) 7%, var(--bg));
      }
      .tier-head {
        display: flex;
        align-items: baseline;
        gap: 0.6rem;
        flex-wrap: wrap;
      }
      .tier-name {
        font-size: 0.98rem;
        font-weight: 800;
        color: var(--tier-color);
      }
      .tier-sub {
        font-size: 0.76rem;
        color: var(--muted);
      }
      .band-body {
        position: relative;
        padding-left: 22px;
        margin-top: 0.8rem;
      }
      .band-body::before {
        content: "";
        position: absolute;
        left: 7px;
        top: 6px;
        bottom: 6px;
        width: 2px;
        background: var(--line-strong);
        border-radius: 2px;
      }
      .rblock {
        position: relative;
        margin: 0 0 1.1rem;
      }
      .rblock:last-child {
        margin-bottom: 0.1rem;
      }
      .rblock::before {
        content: "";
        position: absolute;
        left: -15px;
        top: 18px;
        width: 13px;
        height: 2px;
        background: var(--line-strong);
      }
      .chunks {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin: 0.6rem 0 0 0.1rem;
      }
      .chunks:empty {
        display: none;
      }

      .node {
        font: inherit;
        cursor: pointer;
        border: 2px solid var(--node-border);
        border-radius: 11px;
        padding: 0.5rem 0.8rem;
        text-align: left;
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        box-shadow: var(--shadow);
        transition:
          transform 0.12s,
          box-shadow 0.12s;
      }
      .node:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 14px rgba(26, 18, 10, 0.12);
      }
      .node.region {
        background: var(--node-primary);
        color: var(--node-ink);
        font-weight: 750;
        font-size: 1.02rem;
      }
      .node.chunk {
        background: var(--node);
        color: var(--node-ink);
        font-weight: 600;
        font-size: 0.9rem;
      }
      .node.grammar {
        background: var(--accent-soft);
        color: var(--accent);
        border-color: var(--accent);
        font-weight: 700;
        font-size: 0.85rem;
      }
      .node.here {
        outline: 3px solid var(--accent);
        outline-offset: 2px;
      }
      .node .lbl {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 46ch;
      }

      .mlvl {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        display: inline-grid;
        place-items: center;
        font-size: 11px;
        line-height: 1;
        font-weight: 800;
        color: #fff;
        flex: none;
      }
      .mlvl.m0 {
        background: var(--m0);
      }
      .mlvl.m1 {
        background: var(--m1);
      }
      .mlvl.m2 {
        background: var(--m2);
      }
      .mlvl.m3 {
        background: var(--m3);
      }
      .mlvl.m4 {
        background: var(--m4);
      }
      .mlvl.due {
        box-shadow:
          0 0 0 2px var(--bg),
          0 0 0 4px var(--due);
      }

      .parked {
        margin: 1.2rem 0 3rem;
      }
      .parked h2,
      .roadmap-h {
        font-size: 0.74rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        font-weight: 700;
        margin: 0 0 0.8rem;
      }
      .parked ul {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .parked li {
        padding: 0.5rem 0.8rem;
        border: 1px dashed var(--line-strong);
        border-radius: 9px;
        margin-bottom: 0.5rem;
        font-size: 0.9rem;
      }
      .empty {
        color: var(--muted);
        font-size: 0.9rem;
      }

      /* kanban board */
      .kanban {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1rem;
        margin-bottom: 2rem;
      }
      @media (max-width: 699px) {
        .kanban {
          grid-template-columns: 1fr;
        }
        .kcol-learned {
          order: 1;
        }
        .kcol-learning {
          order: 2;
        }
        .kcol-locked {
          order: 3;
        }
      }
      .kcol {
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 0.75rem;
        min-height: 200px;
      }
      .kcol-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0.75rem;
      }
      .kcol-label {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
        font-weight: 700;
      }
      .kcol-count {
        font-size: 0.68rem;
        font-weight: 700;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 0.1rem 0.45rem;
        color: var(--muted);
      }
      .kcards {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .kcard {
        font: inherit;
        cursor: pointer;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 0.55rem 0.7rem;
        text-align: left;
        width: 100%;
        transition:
          transform 0.12s,
          border-color 0.12s,
          box-shadow 0.12s;
      }
      .kcard:hover {
        transform: translateY(-1px);
        border-color: var(--line-strong);
        box-shadow: var(--shadow);
      }
      .kcard-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
      }
      .kcard-title {
        font-size: 0.92rem;
        font-weight: 600;
        color: var(--ink);
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .kcard-meta {
        display: flex;
        align-items: center;
        gap: 0.35rem;
        margin-top: 0.3rem;
        flex-wrap: wrap;
      }
      .kcard-region {
        font-size: 0.72rem;
        color: var(--muted);
        background: transparent;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 0.1rem 0.45rem;
      }
      .kdue-badge {
        font-size: 0.68rem;
        font-weight: 700;
        color: var(--due);
        border: 1px solid var(--due);
        border-radius: 999px;
        padding: 0.1rem 0.45rem;
      }
      .kempty {
        color: var(--muted);
        font-size: 0.82rem;
        text-align: center;
        padding: 1.5rem 0.5rem;
      }

      footer {
        color: var(--muted);
        font-size: 0.78rem;
        text-align: center;
        margin: 2rem 0;
      }
      .hidden {
        display: none !important;
      }

      /* drawer */
      #scrim {
        position: fixed;
        inset: 0;
        background: rgba(15, 14, 12, 0.5);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
        z-index: 40;
      }
      #scrim.open {
        opacity: 1;
        pointer-events: auto;
      }
      #drawer {
        position: fixed;
        top: 0;
        right: 0;
        height: 100%;
        width: min(470px, 94vw);
        background: var(--bg);
        border-left: 1px solid var(--line);
        box-shadow: -14px 0 44px rgba(0, 0, 0, 0.2);
        transform: translateX(101%);
        transition: transform 0.26s cubic-bezier(0.2, 0.75, 0.2, 1);
        z-index: 50;
        display: flex;
        flex-direction: column;
      }
      #drawer.open {
        transform: none;
      }
      .dwr-head {
        display: flex;
        align-items: flex-start;
        gap: 0.6rem;
        padding: 1.15rem 1.2rem 0.7rem;
        border-bottom: 1px solid var(--line);
      }
      .dwr-kind {
        font-size: 0.68rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--accent);
        font-weight: 700;
      }
      .dwr-bc {
        font-size: 0.78rem;
        color: var(--muted);
      }
      .dwr-title {
        font-size: 1.18rem;
        font-weight: 700;
        line-height: 1.2;
        margin-top: 0.15rem;
      }
      .dwr-close {
        margin-left: auto;
        cursor: pointer;
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--ink);
        border-radius: 8px;
        width: 32px;
        height: 32px;
        font-size: 1.1rem;
        flex: none;
      }
      .dwr-body {
        padding: 1rem 1.2rem 2.5rem;
        overflow: auto;
      }
      .pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin-bottom: 0.8rem;
        align-items: center;
      }
      .spill {
        font-size: 0.74rem;
        font-weight: 600;
        padding: 0.2rem 0.55rem;
        border-radius: 999px;
        border: 1px solid var(--line);
        color: var(--muted);
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
      }
      .spill.due {
        color: #fff;
        background: var(--due);
        border-color: var(--due);
      }
      .spill.tier {
        border-color: var(--tier-color, var(--accent));
        color: var(--tier-color, var(--accent));
      }
      .dwr-note {
        font-size: 0.98rem;
        margin: 0.2rem 0 0.9rem;
      }
      .dwr-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--muted);
        font-weight: 700;
        margin: 1.1rem 0 0.4rem;
      }
      .gap-box {
        border: 1px solid var(--warn);
        background: color-mix(in srgb, var(--warn) 10%, var(--bg));
        border-radius: 10px;
        padding: 0.6rem 0.8rem;
        font-size: 0.92rem;
        margin: 0.3rem 0 0.2rem;
      }
      .gap-box b {
        color: var(--warn);
      }
      .models {
        list-style: none;
        margin: 0.2rem 0 0;
        padding: 0;
      }
      .models li {
        padding: 0.45rem 0.2rem;
        border-top: 1px dashed var(--line);
        font-size: 0.9rem;
      }
      .models li:first-child {
        border-top: 0;
      }
      .models .mname {
        font-weight: 650;
      }
      .schemawrap {
        overflow-x: auto;
        padding: 0.7rem;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 10px;
      }
      svg.schema {
        height: auto;
        display: block;
      }
      details.reveal {
        margin-top: 0.2rem;
      }
      details.reveal > summary {
        cursor: pointer;
        color: var(--accent);
        font-size: 0.9rem;
        list-style: none;
      }
      details.reveal > summary::-webkit-details-marker {
        display: none;
      }
      details.reveal .ans {
        margin-top: 0.5rem;
        padding: 0.6rem 0.75rem;
        background: var(--accent-soft);
        border-radius: 9px;
        font-size: 0.92rem;
      }
      .grammar-box {
        background: linear-gradient(180deg, var(--accent-soft), transparent);
        border: 1px solid var(--accent);
        border-radius: 11px;
        padding: 0.85rem 1rem;
        margin: 0.4rem 0 0.2rem;
      }
      .vars {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin: 0.2rem 0 0.6rem;
      }
      .var {
        font-size: 0.8rem;
        font-family: var(--mono);
        background: var(--panel);
        border: 1px solid var(--accent);
        color: var(--ink);
        padding: 0.2rem 0.5rem;
        border-radius: 6px;
      }
      .minilist {
        list-style: none;
        margin: 0.3rem 0 0;
        padding: 0;
      }
      .minilist li {
        padding: 0.5rem 0.2rem;
        border-top: 1px dashed var(--line);
      }
      .minilist button {
        all: unset;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        width: 100%;
      }
      .minilist button:hover {
        color: var(--accent);
      }
      .meta {
        font-size: 0.8rem;
        color: var(--muted);
        margin-top: 0.3rem;
      }
    </style>
  </head>
  <body>
    <header class="top">
      <div class="wrap">
        <div class="eyebrow" id="eyebrow">Yoda · roadmap</div>
        <h1 id="topic">—</h1>
        <div class="one-sentence" id="one-sentence"></div>
        <div class="chips" id="chips"></div>
        <div class="progress-wrap">
          <div class="bar"><i id="bar-fill" style="width: 0%"></i></div>
          <div class="bar-label" id="bar-label"></div>
        </div>
        <div class="controls">
          <label class="search"
            ><span aria-hidden="true">⌕</span>
            <input
              id="search"
              type="search"
              placeholder="Filter nodes…  ( / )"
              autocomplete="off"
          /></label>
          <button class="btn" id="reviews-btn">
            Reviews <span class="pill zero" id="due-pill">0</span>
          </button>
          <button class="btn" id="here-btn">↩ You are here</button>
          <button class="btn" id="theme-btn">◑ Theme</button>
        </div>
      </div>
    </header>

    <main class="wrap">
      <div class="legend" id="legend"></div>
      <div class="roadmap-h">
        Your learning board — click any card for detail
      </div>
      <div id="roadmap"></div>
      <section class="parked" id="parked"></section>
      <footer>
        Generated from <code>state.json</code> by build_map.py · the file is the
        source of truth, this page is a view.
      </footer>
    </main>

    <div id="scrim"></div>
    <aside id="drawer" aria-hidden="true">
      <div class="dwr-head">
        <div>
          <div class="dwr-kind" id="dwr-kind"></div>
          <div class="dwr-bc" id="dwr-bc"></div>
          <div class="dwr-title" id="dwr-title"></div>
        </div>
        <button class="dwr-close" id="dwr-close" aria-label="Close">✕</button>
      </div>
      <div class="dwr-body" id="dwr-body"></div>
    </aside>

    <script id="yoda-state" type="application/json">
      __STATE_JSON__
    </script>
    <script>
      (function () {
        "use strict";
        var STATE;
        var raw = document.getElementById("yoda-state").textContent;
        // Opened the bare template (placeholder never filled by build_map.py)?
        // Reconstruct the token at runtime so build_map's replace() can't clobber this check.
        if (raw.indexOf("__STATE_" + "JSON__") !== -1) {
          document.body.innerHTML =
            '<div class="wrap" style="padding:3rem;max-width:640px">' +
            "<h1>This is the yoda map template</h1>" +
            "<p>There's no topic in it yet. Generate a real map by running " +
            "<code>build_map.py</code> on a topic's <code>state.json</code>, then open the " +
            "<code>map.html</code> it writes next to that file.</p></div>";
          return;
        }
        try {
          STATE = JSON.parse(raw);
        } catch (e) {
          document.body.innerHTML =
            '<div class="wrap" style="padding:3rem">Could not parse state.json: ' +
            (e && e.message ? e.message : e) +
            "</div>";
          return;
        }

        var REGIONS = (STATE.terrain && STATE.terrain.regions) || [];
        var CHUNKS = STATE.chunks || [];
        var GRAMMARS = STATE.grammars || [];
        var QUESTIONS = (STATE.open_questions || []).filter(function (q) {
          return !q.resolved;
        });
        var byId = function (id) {
          return document.getElementById(id);
        };
        var esc = function (s) {
          return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
            return {
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            }[c];
          });
        };
        var todayStr = new Date().toISOString().slice(0, 10);
        function isDue(d) {
          return d && d <= todayStr;
        }
        function itemDue(o) {
          return o && o.reviews && isDue(o.reviews.next_due);
        }
        function chunksOf(rid) {
          return CHUNKS.filter(function (c) {
            return c.region === rid;
          });
        }
        function grammarsOf(rid) {
          return GRAMMARS.filter(function (g) {
            return g.region === rid;
          });
        }
        function findChunk(id) {
          return CHUNKS.filter(function (c) {
            return c.id === id;
          })[0];
        }
        function findGrammar(id) {
          return GRAMMARS.filter(function (g) {
            return g.id === id;
          })[0];
        }
        function findRegion(id) {
          return REGIONS.filter(function (r) {
            return r.id === id;
          })[0];
        }
        function regionTitle(id) {
          var r = findRegion(id);
          return r ? r.title : id;
        }

        // ladders
        var TIER_ORDER = ["foundation", "core", "advanced", "frontier"];
        var TIER_DEFAULT = ["Foundations", "Core", "Advanced", "Frontier"];
        var TIER_DESC = {
          foundation: "first principles — everything rests here",
          core: "the main working mechanics",
          advanced: "deeper mechanics and edges",
          frontier: "expert, rare-air territory",
        };
        var MAST_DEFAULT = ["Unseen", "Fragile", "Working", "Solid", "Expert"];
        function tierKey(r) {
          var t = (r.tier || "core").toLowerCase();
          return TIER_ORDER.indexOf(t) >= 0 ? t : "core";
        }
        function tierLabel(key) {
          var L = STATE.tier_labels || TIER_DEFAULT;
          return L[TIER_ORDER.indexOf(key)] || key;
        }
        function mLabel(n) {
          var L = STATE.mastery_labels || MAST_DEFAULT;
          return L[Math.max(0, Math.min(4, Math.round(n)))] || "";
        }
        function chunkMastery(c) {
          if (typeof c.mastery === "number") return c.mastery;
          return { learned: 3, learning: 2, locked: 0 }[c.status] || 0;
        }
        function regionMastery(rid) {
          var started = chunksOf(rid)
            .map(chunkMastery)
            .filter(function (m) {
              return m > 0;
            });
          return started.length
            ? started.reduce(function (a, b) {
                return a + b;
              }, 0) / started.length
            : 0;
        }
        function mBadge(level, due) {
          var l = Math.max(0, Math.min(4, Math.round(level)));
          return (
            "<span class='mlvl m" +
            l +
            (due ? " due" : "") +
            "' title='mastery " +
            l +
            " · " +
            esc(mLabel(l)) +
            "'>" +
            l +
            "</span>"
          );
        }

        // ---- header -----------------------------------------------------------
        document.title = (STATE.topic || "Yoda") + " — roadmap";
        byId("topic").textContent = STATE.topic || "Untitled topic";
        var os = byId("one-sentence");
        if (STATE.one_sentence) os.textContent = STATE.one_sentence;
        else os.classList.add("hidden");
        var totalLearned = CHUNKS.filter(function (c) {
          return c.status === "learned";
        }).length;
        var dueCount = CHUNKS.concat(GRAMMARS).filter(itemDue).length;
        var started = CHUNKS.map(chunkMastery).filter(function (m) {
          return m > 0;
        });
        var overall = started.length
          ? started.reduce(function (a, b) {
              return a + b;
            }, 0) / started.length
          : 0;
        var chips = [];
        if (STATE.goal)
          chips.push(
            "<span class='chip'><b>Goal</b> " + esc(STATE.goal) + "</span>",
          );
        chips.push(
          "<span class='chip level'><b>Level " +
            overall.toFixed(1) +
            "</b> · " +
            (started.length ? esc(mLabel(overall)) : "not started") +
            "</span>",
        );
        chips.push(
          "<span class='chip'><b>" + REGIONS.length + "</b> regions</span>",
        );
        chips.push(
          "<span class='chip'><b>" +
            GRAMMARS.length +
            "</b> grammar" +
            (GRAMMARS.length === 1 ? "" : "s") +
            "</span>",
        );
        byId("chips").innerHTML = chips.join("");
        var pct = CHUNKS.length
          ? Math.round((100 * totalLearned) / CHUNKS.length)
          : 0;
        byId("bar-fill").style.width = pct + "%";
        byId("bar-label").textContent =
          totalLearned +
          " / " +
          CHUNKS.length +
          " chunks at Solid+ (" +
          pct +
          "%)";
        var pill = byId("due-pill");
        pill.textContent = dueCount;
        pill.classList.toggle("zero", dueCount === 0);

        // ---- legend (hidden — kanban makes it unnecessary) --------------------
        (function legend() {
          byId("legend").innerHTML = "";
        })();

        // ---- roadmap (kanban: locked / learning / learned) -------------------
        (function roadmap() {
          var host = byId("roadmap");

          function makeCard(item, kind) {
            var isGrammar = kind === "grammar";
            var title = isGrammar ? "✦ grammar" : item.title;
            var searchText = isGrammar
              ? (
                  "grammar " +
                  (item.paragraph || "") +
                  " " +
                  (item.variables || []).join(" ")
                ).toLowerCase()
              : (
                  item.title +
                  " " +
                  (item.note || "") +
                  " " +
                  (item.recall_q || "")
                ).toLowerCase();
            var due = itemDue(item);
            return (
              "<button class='kcard' data-kind='" +
              esc(kind) +
              "' data-id='" +
              esc(item.id) +
              "' data-text=\"" +
              esc(searchText) +
              '">' +
              "<div class='kcard-top'>" +
              "<span class='kcard-title'>" +
              esc(title) +
              "</span>" +
              mBadge(chunkMastery(item), due) +
              "</div>" +
              "<div class='kcard-meta'>" +
              "<span class='kcard-region'>" +
              esc(regionTitle(item.region)) +
              "</span>" +
              (due ? "<span class='kdue-badge'>due</span>" : "") +
              "</div>" +
              "</button>"
            );
          }

          function makeColumn(colClass, label, cards) {
            var inner = cards.length
              ? "<div class='kcards'>" + cards.join("") + "</div>"
              : "<div class='kempty'>Nothing here yet</div>";
            return (
              "<div class='kcol " +
              colClass +
              "'>" +
              "<div class='kcol-head'>" +
              "<span class='kcol-label'>" +
              esc(label) +
              "</span>" +
              "<span class='kcol-count'>" +
              cards.length +
              "</span>" +
              "</div>" +
              inner +
              "</div>"
            );
          }

          var lockedCards = CHUNKS.filter(function (c) {
            return c.status !== "learning" && c.status !== "learned";
          }).map(function (c) {
            return makeCard(c, "chunk");
          });

          var learningCards = CHUNKS.filter(function (c) {
            return c.status === "learning";
          }).map(function (c) {
            return makeCard(c, "chunk");
          });

          var learnedCards = CHUNKS.filter(function (c) {
            return c.status === "learned";
          })
            .map(function (c) {
              return makeCard(c, "chunk");
            })
            .concat(
              GRAMMARS.map(function (g) {
                return makeCard(g, "grammar");
              }),
            );

          host.innerHTML =
            "<div class='kanban'>" +
            makeColumn("kcol-locked", "Locked", lockedCards) +
            makeColumn("kcol-learning", "Learning", learningCards) +
            makeColumn("kcol-learned", "Learned", learnedCards) +
            "</div>";
        })();

        // ---- parked questions -------------------------------------------------
        (function parked() {
          var el = byId("parked");
          if (!QUESTIONS.length) {
            el.classList.add("hidden");
            return;
          }
          el.innerHTML =
            "<h2>Parked questions</h2><ul>" +
            QUESTIONS.map(function (q) {
              return (
                "<li>" +
                esc(q.text) +
                (q.added
                  ? " <span class='empty'>· parked " + esc(q.added) + "</span>"
                  : "") +
                "</li>"
              );
            }).join("") +
            "</ul>";
        })();

        // ---- schema renderer --------------------------------------------------
        function renderSchema(s) {
          if (!s || !s.nodes || !s.nodes.length) return "";
          var nodes = s.nodes,
            labels = s.labels || [],
            stack = s.type === "stack";
          var bw = stack ? 200 : 116,
            bh = 36,
            gap = stack ? 34 : 30,
            n = nodes.length,
            parts = [],
            W,
            H;
          function box(x, y, txt) {
            var max = stack ? 28 : 15,
              t = txt.length > max ? txt.slice(0, max - 1) + "…" : txt;
            return (
              "<g><rect x='" +
              x +
              "' y='" +
              y +
              "' width='" +
              bw +
              "' height='" +
              bh +
              "' rx='8' fill='var(--node)' stroke='var(--node-border)' stroke-width='1.5'/>" +
              "<text x='" +
              (x + bw / 2) +
              "' y='" +
              (y + bh / 2 + 4) +
              "' text-anchor='middle' font-size='12' font-weight='600' fill='var(--node-ink)' font-family='var(--font)'>" +
              esc(t) +
              "<title>" +
              esc(txt) +
              "</title></text></g>"
            );
          }
          if (stack) {
            W = bw + 90;
            H = n * bh + (n - 1) * gap + 10;
            for (var i = 0; i < n; i++) {
              var y = 5 + i * (bh + gap),
                mx = 10 + bw / 2;
              parts.push(box(10, y, nodes[i]));
              if (i < n - 1) {
                parts.push(
                  "<line x1='" +
                    mx +
                    "' y1='" +
                    (y + bh) +
                    "' x2='" +
                    mx +
                    "' y2='" +
                    (y + bh + gap) +
                    "' stroke='var(--line-strong)' stroke-width='1.6' marker-end='url(#sar)'/>",
                );
                if (labels[i])
                  parts.push(
                    "<text x='" +
                      (mx + 10) +
                      "' y='" +
                      (y + bh + gap / 2 + 4) +
                      "' font-size='11' fill='var(--muted)' font-family='var(--font)'>" +
                      esc(labels[i]) +
                      "</text>",
                  );
              }
            }
          } else {
            W = n * bw + (n - 1) * gap + 10;
            H = bh + 32;
            for (var j = 0; j < n; j++) {
              var x = 5 + j * (bw + gap),
                my = 18 + bh / 2;
              parts.push(box(x, 18, nodes[j]));
              if (j < n - 1) {
                parts.push(
                  "<line x1='" +
                    (x + bw) +
                    "' y1='" +
                    my +
                    "' x2='" +
                    (x + bw + gap) +
                    "' y2='" +
                    my +
                    "' stroke='var(--line-strong)' stroke-width='1.6' marker-end='url(#sar)'/>",
                );
                if (labels[j])
                  parts.push(
                    "<text x='" +
                      (x + bw + gap / 2) +
                      "' y='" +
                      (my - 8) +
                      "' text-anchor='middle' font-size='11' fill='var(--muted)' font-family='var(--font)'>" +
                      esc(labels[j]) +
                      "</text>",
                  );
              }
            }
          }
          return (
            "<div class='schemawrap'><svg class='schema' viewBox='0 0 " +
            W +
            " " +
            H +
            "' width='" +
            W +
            "' xmlns='http://www.w3.org/2000/svg'>" +
            "<defs><marker id='sar' markerWidth='8' markerHeight='8' refX='6' refY='3' orient='auto'><path d='M0,0 L6,3 L0,6 Z' fill='var(--line-strong)'/></marker></defs>" +
            parts.join("") +
            "</svg></div>"
          );
        }
        function modelsBlock(o) {
          if (!o.models || !o.models.length) return "";
          return (
            "<div class='dwr-label'>Key theories &amp; models</div><ul class='models'>" +
            o.models
              .map(function (m) {
                return (
                  "<li><span class='mname'>" +
                  esc(m.name || "?") +
                  "</span>" +
                  (m.note ? " — " + esc(m.note) : "") +
                  "</li>"
                );
              })
              .join("") +
            "</ul>"
          );
        }

        // ---- drawer -----------------------------------------------------------
        var drawer = byId("drawer"),
          scrim = byId("scrim");
        function openDrawer() {
          drawer.classList.add("open");
          scrim.classList.add("open");
          drawer.setAttribute("aria-hidden", "false");
          byId("dwr-body").scrollTop = 0;
        }
        function closeDrawer() {
          drawer.classList.remove("open");
          scrim.classList.remove("open");
          drawer.setAttribute("aria-hidden", "true");
        }
        function setHead(kind, bc, title) {
          byId("dwr-kind").textContent = kind;
          byId("dwr-bc").textContent = bc || "";
          byId("dwr-title").textContent = title;
        }
        function reviewMeta(o) {
          if (!o.reviews) return "";
          var r = o.reviews,
            h = r.history || [],
            last = h[h.length - 1] || {};
          return (
            "<div class='meta'>Review: next " +
            esc(r.next_due || "—") +
            " · interval " +
            (r.interval || 0) +
            "d · seen " +
            (r.reps || 0) +
            "× · last “" +
            esc(last.grade || "—") +
            "”</div>"
          );
        }
        function masteryPills(level, due) {
          var l = Math.max(0, Math.min(4, Math.round(level)));
          return (
            "<div class='pill-row'>" +
            mBadge(level, false) +
            "<span class='spill'>Level " +
            l +
            " · " +
            esc(mLabel(l)) +
            "</span>" +
            (due ? "<span class='spill due'>review due</span>" : "") +
            "</div>"
          );
        }
        function gapBox(o) {
          var l = Math.round(chunkMastery(o));
          if (l >= 4)
            return "<div class='gap-box'><b>Expert.</b> Nothing to close here.</div>";
          if (!o.gap) return "";
          return (
            "<div class='gap-box'><b>To level up →</b> " + esc(o.gap) + "</div>"
          );
        }
        function recallBlock(c) {
          if (!c.recall_q) return "";
          return (
            "<div class='dwr-label'>Recall</div><div>" +
            esc(c.recall_q) +
            "</div>" +
            (c.recall_a
              ? "<details class='reveal'><summary>show answer</summary><div class='ans'>" +
                esc(c.recall_a) +
                "</div></details>"
              : "")
          );
        }
        function showChunk(c) {
          setHead("chunk", regionTitle(c.region), c.title);
          var body =
            masteryPills(chunkMastery(c), itemDue(c)) +
            gapBox(c) +
            (c.note
              ? "<div class='dwr-note'>" + esc(c.note) + "</div>"
              : "<p class='empty'>Not taught yet — this is planned terrain.</p>");
          if (c.schema)
            body +=
              "<div class='dwr-label'>Schema</div>" + renderSchema(c.schema);
          body += modelsBlock(c) + recallBlock(c) + reviewMeta(c);
          byId("dwr-body").innerHTML = body;
          openDrawer();
        }
        function showGrammar(g) {
          setHead(
            "grammar",
            regionTitle(g.region),
            "Grammar — " + regionTitle(g.region),
          );
          var vars = (g.variables || [])
            .map(function (v) {
              return "<span class='var'>" + esc(v) + "</span>";
            })
            .join("");
          var body =
            masteryPills(chunkMastery(g), itemDue(g)) +
            gapBox(g) +
            "<div class='grammar-box'>" +
            (vars ? "<div class='vars'>" + vars + "</div>" : "") +
            "<div>" +
            esc(g.paragraph || "") +
            "</div></div>";
          if (g.schema)
            body +=
              "<div class='dwr-label'>Schema</div>" + renderSchema(g.schema);
          body += modelsBlock(g) + reviewMeta(g);
          byId("dwr-body").innerHTML = body;
          openDrawer();
        }
        function showRegion(r) {
          var tk = tierKey(r);
          setHead("region · " + tierLabel(tk), null, r.title);
          var cs = chunksOf(r.id),
            learned = cs.filter(function (c) {
              return chunkMastery(c) >= 3;
            }).length;
          var body =
            "<div class='pill-row'><span class='spill tier' style='--tier-color:var(--t-" +
            tk +
            ")'>" +
            esc(tierLabel(tk)) +
            "</span>" +
            mBadge(regionMastery(r.id), false) +
            "<span class='spill'>region level " +
            Math.round(regionMastery(r.id)) +
            "</span></div>" +
            (r.summary
              ? "<div class='dwr-note'>" + esc(r.summary) + "</div>"
              : "") +
            "<div class='meta'>" +
            learned +
            " / " +
            cs.length +
            " chunks at Solid+</div>";
          body += modelsBlock(r);
          grammarsOf(r.id).forEach(function (g) {
            var vars = (g.variables || [])
              .map(function (v) {
                return "<span class='var'>" + esc(v) + "</span>";
              })
              .join("");
            body +=
              "<div class='dwr-label'>Grammar</div><div class='grammar-box'>" +
              (vars ? "<div class='vars'>" + vars + "</div>" : "") +
              "<div>" +
              esc(g.paragraph || "") +
              "</div></div>";
          });
          body += "<div class='dwr-label'>Chunks</div>";
          body += cs.length
            ? "<ul class='minilist'>" +
              cs
                .map(function (c) {
                  return (
                    "<li><button data-kind='chunk' data-id='" +
                    esc(c.id) +
                    "'>" +
                    mBadge(chunkMastery(c), itemDue(c)) +
                    "<span>" +
                    esc(c.title) +
                    "</span></button></li>"
                  );
                })
                .join("") +
              "</ul>"
            : "<p class='empty'>No chunks here yet.</p>";
          byId("dwr-body").innerHTML = body;
          openDrawer();
        }
        function showReviews() {
          var items = CHUNKS.concat(GRAMMARS).filter(itemDue);
          setHead("reviews", null, "Due for review");
          if (!items.length) {
            byId("dwr-body").innerHTML =
              "<p class='empty'>Nothing due today. Come back when items ripen.</p>";
            openDrawer();
            return;
          }
          var body =
            "<div class='dwr-note'>Answer each from memory, then reveal. yoda rates you honestly and reschedules.</div><ul class='minilist'>";
          body +=
            items
              .map(function (o) {
                var isG = !!o.variables;
                var q = isG
                  ? "Reconstruct the grammar of <b>" +
                    esc(regionTitle(o.region)) +
                    "</b> from its variables."
                  : esc(o.recall_q || o.title);
                var a = isG
                  ? esc(o.paragraph || "")
                  : esc(o.recall_a || o.note || "");
                return (
                  "<li><div>" +
                  q +
                  "</div><details class='reveal'><summary>reveal</summary><div class='ans'>" +
                  a +
                  "</div></details>" +
                  "<div class='meta'>" +
                  (isG ? "grammar" : "chunk") +
                  " · " +
                  esc(o.id) +
                  " · due " +
                  esc(o.reviews.next_due) +
                  "</div></li>"
                );
              })
              .join("") + "</ul>";
          byId("dwr-body").innerHTML = body;
          openDrawer();
        }
        function dispatch(kind, id) {
          if (kind === "chunk") {
            var c = findChunk(id);
            if (c) showChunk(c);
          } else if (kind === "grammar") {
            var g = findGrammar(id);
            if (g) showGrammar(g);
          } else if (kind === "region") {
            var r = findRegion(id);
            if (r) showRegion(r);
          }
        }
        document.addEventListener("click", function (e) {
          var t = e.target.closest("[data-kind]");
          if (!t) return;
          dispatch(t.getAttribute("data-kind"), t.getAttribute("data-id"));
        });
        byId("reviews-btn").addEventListener("click", showReviews);
        byId("dwr-close").addEventListener("click", closeDrawer);
        scrim.addEventListener("click", closeDrawer);
        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape") closeDrawer();
          if (e.key === "/" && document.activeElement !== byId("search")) {
            e.preventDefault();
            byId("search").focus();
          }
        });

        // ---- search -----------------------------------------------------------
        byId("search").addEventListener("input", function () {
          var q = this.value.trim().toLowerCase();
          document.querySelectorAll(".kcard").forEach(function (card) {
            var hit =
              !q || (card.getAttribute("data-text") || "").indexOf(q) !== -1;
            card.classList.toggle("hidden", !hit);
          });
          document.querySelectorAll(".kcol").forEach(function (col) {
            var cards = col.querySelectorAll(".kcard");
            if (!cards.length) return;
            var anyVisible = Array.prototype.some.call(cards, function (c) {
              return !c.classList.contains("hidden");
            });
            col.classList.toggle("hidden", q.length > 0 && !anyVisible);
          });
        });

        // ---- here + theme -----------------------------------------------------
        byId("here-btn").addEventListener("click", function () {
          var blk = document.querySelector(
            ".rblock[data-region='" + (STATE.you_are_here || "") + "']",
          );
          if (blk) blk.scrollIntoView({ behavior: "smooth", block: "center" });
        });
        if (!STATE.you_are_here) byId("here-btn").classList.add("hidden");

        var store = (function () {
          try {
            return window.localStorage;
          } catch (e) {
            return null;
          }
        })();
        var saved = store && store.getItem("yoda-theme");
        if (saved) document.documentElement.setAttribute("data-theme", saved);
        byId("theme-btn").addEventListener("click", function () {
          var cur = document.documentElement.getAttribute("data-theme");
          var dark = cur
            ? cur === "dark"
            : window.matchMedia("(prefers-color-scheme: dark)").matches;
          var next = dark ? "light" : "dark";
          document.documentElement.setAttribute("data-theme", next);
          if (store)
            try {
              store.setItem("yoda-theme", next);
            } catch (e) {}
        });
      })();
    </script>
  </body>
</html>
